[project]
name = "prompt-tuning"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "dspy>=3.0.3",
  "loguru>=0.7.3",
  "pydantic>=2.11.10",
  "sentence-transformers>=5.1.1",
  "seqscore",
]

[tool.uv.sources]
seqscore = { git = "https://github.com/Wollaston/seqscore-dev-pydantic" }

[dependency-groups]
dev = ["pytest>=8.4.2"]

[build-system]
requires = ["uv_build>=0.8.24,<0.9.0"]
build-backend = "uv_build"
