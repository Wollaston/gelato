[project]
name = "clients"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "loguru>=0.7.3",
  "numpy>=2.3.3",
  "openai>=2.1.0",
  "pydantic>=2.11.10",
]

[build-system]
requires = ["uv_build>=0.8.23,<0.9.0"]
build-backend = "uv_build"


[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
pythonpath = "src"

[dependency-groups]
dev = ["pytest>=8.4.0"]
