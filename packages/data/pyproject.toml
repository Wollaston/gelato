[project]
name = "data"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["seqscore"]

[tool.uv.sources]
seqscore = { git = "https://github.com/Wollaston/seqscore-dev-pydantic.git" }

[build-system]
requires = ["uv_build>=0.8.23,<0.9.0"]
build-backend = "uv_build"


[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
pythonpath = "src"

[dependency-groups]
dev = ["pytest>=8.4.0"]
